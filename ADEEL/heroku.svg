<svg xmlns="http://www.w3.org/2000/svg" width="300" height="90" viewBox="0 0 300 90">
  <defs>
    <linearGradient id="eliteGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700">
        <animate attributeName="stop-color" values="#FFD700;#FF1493;#00FFFF;#FFD700" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#FF1493">
        <animate attributeName="stop-color" values="#FF1493;#00FFFF;#FFD700;#FF1493;" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <radialGradient id="deepBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#15152a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <filter id="ultraGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="innerBox">
      <rect x="5" y="5" width="290" height="80" rx="20" />
    </clipPath>
  </defs>

  <rect x="2" y="2" width="296" height="86" rx="22" fill="#000" stroke="url(#eliteGrad)" stroke-width="3">
    <animate attributeName="stroke-opacity" values="1;0.5;1" dur="4s" repeatCount="indefinite" />
  </rect>
  <rect x="5" y="5" width="290" height="80" rx="20" fill="url(#deepBg)" />

  <g clip-path="url(#innerBox)" opacity="0.3">
    <rect x="-150" y="25" width="120" height="1" fill="#00FFFF">
      <animate attributeName="x" values="-150;350" dur="10s" repeatCount="indefinite" />
    </rect>
    <rect x="350" y="50" width="120" height="1" fill="#FF1493">
      <animate attributeName="x" values="350;-150" dur="12s" repeatCount="indefinite" />
    </rect>
    <rect x="-150" y="70" width="120" height="1" fill="#FFD700">
      <animate attributeName="x" values="-150;350" dur="14s" repeatCount="indefinite" />
    </rect>
  </g>

  <g clip-path="url(#innerBox)">
    <circle r="1" fill="#fff"><animate attributeName="cx" values="20;280;20" dur="15s" repeatCount="indefinite" /><animate attributeName="cy" values="10;70;10" dur="18s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" /></circle>
    <circle r="1.2" fill="#00FFFF"><animate attributeName="cx" values="270;30;270" dur="20s" repeatCount="indefinite" /><animate attributeName="cy" values="70;10;70" dur="14s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite" /></circle>
    <circle r="0.8" fill="#FFD700"><animate attributeName="cx" values="100;200;100" dur="25s" repeatCount="indefinite" /><animate attributeName="cy" values="60;20;60" dur="22s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" /></circle>
    <circle r="1" fill="#FF1493"><animate attributeName="cx" values="50;250;50" dur="18s" repeatCount="indefinite" /><animate attributeName="cy" values="40;80;40" dur="16s" repeatCount="indefinite" /><animate attributeName="opacity" values="0;0.7;0" dur="3.5s" repeatCount="indefinite" /></circle>
    <circle cx="150" cy="45" r="0.7" fill="#fff"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" /></circle>
    <circle cx="80" cy="20" r="0.9" fill="#00FFFF"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.5s" repeatCount="indefinite" /></circle>
    <circle cx="220" cy="75" r="0.8" fill="#FFD700"><animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" /></circle>
  </g>

  <text x="150" y="58" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="44" font-weight="950" fill="url(#eliteGrad)" filter="url(#ultraGlow)" style="text-transform: uppercase; letter-spacing: 5px;">
    HEROKU
    <animate attributeName="letter-spacing" values="5;7;5" dur="6s" repeatCount="indefinite" />
  </text>

  <rect x="100" y="73" width="100" height="2" rx="1" fill="url(#eliteGrad)" opacity="0.8" filter="url(#ultraGlow)">
    <animate attributeName="width" values="60;140;60" dur="5s" repeatCount="indefinite" />
    <animate attributeName="x" values="120;80;120" dur="5s" repeatCount="indefinite" />
  </rect>
</svg>
